<script>
  // Function to render Hero Ring section
  function renderHeroRing(dayData) {
    const eaten = dayData.eaten || 0;
    const burned = dayData.burned || 0;
    const goal = dayData.goal || 2000;
    const remaining = Math.max(0, goal - eaten);
    const percentage = Math.min(100, Math.round((eaten / goal) * 100));

    // Update values
    document.getElementById('eatenValue').textContent = eaten.toLocaleString();
    document.getElementById('burnedValue').textContent = burned.toLocaleString();
    document.getElementById('percentageValue').textContent = percentage + '%';
    document.getElementById('remainingValue').textContent = remaining.toLocaleString() + ' kcal';

    // Update ring progress
    const ringLength = 2 * Math.PI * 70; // circumference
    const progress = (percentage / 100) * ringLength;
    const gapPercentage = Math.max(0, 100 - percentage);
    const gapLength = (gapPercentage / 100) * ringLength;
    document.getElementById('progressRing').setAttribute(
      'stroke-dasharray',
      progress + ' ' + gapLength
    );

    // Color indicator based on status
    const ring = document.getElementById('progressRing');
    if (percentage >= 95) {
      ring.setAttribute('stroke', '#34c66b'); // Green - on track
    } else if (percentage >= 75) {
      ring.setAttribute('stroke', '#ff7a1a'); // Orange - warning
    } else {
      ring.setAttribute('stroke', '#ff4d3d'); // Red - under
    }
  }

  // Function to render meals list
  function renderMealsList(meals) {
    const container = document.getElementById('mealsList');
    
    if (!meals || meals.length === 0) {
      container.innerHTML = `
        <div class="today-empty-state">
          <div class="today-empty-icon">🍽️</div>
          <div class="today-empty-text">No meals recorded yet</div>
          <button class="today-empty-action" onclick="openAddFoodModal()">Add Meal</button>
        </div>
      `;
      return;
    }

    container.innerHTML = meals.map(meal => `
      <div class="today-item">
        <div class="today-item-left">
          <div class="today-item-name">${meal.name}</div>
          <div class="today-item-desc">${meal.description || 'Custom meal'}</div>
        </div>
        <div class="today-item-right">
          <div class="today-item-value today-item-value-meal">${meal.calories}</div>
          <div class="today-item-subvalue">${meal.protein || 0}g protein</div>
        </div>
      </div>
    `).join('');
  }

  // Function to render workouts list
  function renderWorkoutsList(workouts) {
    const container = document.getElementById('workoutsList');
    
    if (!workouts || workouts.length === 0) {
      container.innerHTML = `
        <div class="today-empty-state">
          <div class="today-empty-icon">⚡</div>
          <div class="today-empty-text">No workouts recorded yet</div>
          <button class="today-empty-action" onclick="openAddWorkoutModal()">Add Workout</button>
        </div>
      `;
      return;
    }

    container.innerHTML = workouts.map(workout => `
      <div class="today-item">
        <div class="today-item-left">
          <div class="today-item-name">${workout.type}</div>
          <div class="today-item-desc">${workout.distance ? workout.distance + 'km' : ''} ${workout.duration ? workout.duration + ' min' : ''}</div>
        </div>
        <div class="today-item-right">
          <div class="today-item-value today-item-value-workout">${workout.burned}</div>
          <div class="today-item-subvalue">${workout.duration || 0}m</div>
        </div>
      </div>
    `).join('');
  }

  // Main function to render today page
  function renderTodayPage(selectedDate) {
    const dayData = getDayTotals(selectedDate); // ต้อง implement this function
    
    // Render all components
    renderHeroRing(dayData);
    renderMealsList(dayData.meals || []);
    renderWorkoutsList(dayData.workouts || []);
  }

  // Helper: Calculate daily totals
  function getDayTotals(dateStr) {
    const meals = data.meals?.[dateStr] || [];
    const workouts = data.workouts?.[dateStr] || [];

    const eaten = meals.reduce((sum, m) => sum + (m.calories || 0), 0);
    const burned = workouts.reduce((sum, w) => sum + (w.burned || 0), 0);
    const goal = data.settings?.dailyGoal || 2000;

    return {
      eaten,
      burned,
      goal,
      remaining: goal - eaten,
      meals,
      workouts
    };
  }

</script>
